<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Garrados | Análisis de Máquinas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🕹️ A-GARRADOS</h1>
        <p style="text-align: center; color: white;">Catálogo de análisis técnico: Habilidad vs. Azar</p>
    </header>

    <div style="text-align: center; margin: 20px;">
        <input type="text" id="buscador" placeholder="Buscar por ciudad o máquina..." style="padding: 10px; width: 80%; max-width: 400px; background: #111; color: #00ffff; border: 1px solid #00ffff; border-radius: 5px;">
    </div>

    <div class="filter-container" style="text-align: center; margin-bottom: 30px;">
        <button class="filter-btn" onclick="filtrar('Todas', this)">TODAS</button>
        <button class="filter-btn" onclick="filtrar('Habilidad', this)">HABILIDAD</button>
        <button class="filter-btn" onclick="filtrar('Azar', this)">AZAR</button>
    </div>

    <div id="grid-maquinas" class="grid-container">
        </div>

    <div id="modal-maquina" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="cerrarModal()">×</span>
            <div id="modal-body"></div>
        </div>
    </div>
     <footer>
            <p>© 2026 A-Garrados. Proyecto educativo de análisis técnico y recreativo.</p>
            <p>Aviso: Las opiniones son observaciones personales de carácter técnico y no representan declaraciones oficiales.</p>
        </footer>

    <script src="script.js"></script>
</body>
</html>
